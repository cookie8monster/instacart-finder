// ── Haversine distance (miles) ────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 3958.8, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

// ── Forward-geocode ZIP → lat/lng via Nominatim ───────────────────────────────
async function geocodeZip(zip) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/search?postalcode=${zip}&country=US&format=json&limit=1&email=tech@purelyelizabeth.com`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const d = await r.json();
    if (d.length) return { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) };
  } catch {}
  return null;
}

// ── Find nearest branch of a store chain via Nominatim ───────────────────────
async function findStoreNear(storeName, lat, lng) {
  const delta = 0.6; // ~40 mile bounding box
  try {
    const url = `https://nominatim.openstreetmap.org/search?` +
      `q=${encodeURIComponent(storeName)}&format=json&limit=5&countrycodes=us` +
      `&viewbox=${lng-delta},${lat+delta},${lng+delta},${lat-delta}&bounded=1` +
      `&email=tech@purelyelizabeth.com`;
    const r   = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const res = await r.json();
    if (!res.length) return null;
    let best = null, minDist = Infinity;
    for (const loc of res) {
      const d = haversine(lat, lng, parseFloat(loc.lat), parseFloat(loc.lon));
      if (d < minDist) { minDist = d; best = d; }
    }
    return best; // distance in miles
  } catch { return null; }
}

// ── After initial render, look up distances and re-sort ───────────────────────
async function enrichWithDistances(retailers) {
  if (!userLocation) return;
  const { lat, lng } = userLocation;

  // Parallel lookups — all stores at once
  const dists = await Promise.all(
    retailers.map(r => findStoreNear(r.name, lat, lng))
  );

  // Attach distances
  const enriched = retailers.map((r, i) => ({ ...r, _dist: dists[i] }));

  // Sort: known distances first (ascending), unknowns last
  enriched.sort((a, b) => {
    if (a._dist == null && b._dist == null) return 0;
    if (a._dist == null) return 1;
    if (b._dist == null) return -1;
    return a._dist - b._dist;
  });

  allRetailers = enriched;
  renderResults(enriched, currentPostalCode, true); // true = skip re-enrichment
}

// ── Location / ZIP entry ──────────────────────────────────────────────────────
function useLocation() {
  const btn = document.getElementById('locate-btn');
  btn.disabled = true; btn.textContent = 'Locating…';
  setStatus('Requesting location access…');

  if (!navigator.geolocation) {
    setStatus('Geolocation not supported. Please enter a ZIP code.');
    btn.disabled = false; btn.textContent = '📍 Use my location'; return;
  }

  navigator.geolocation.getCurrentPosition(
    async pos => {
      userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      setStatus('Got your location — finding ZIP code…');
      const zip = await reverseGeocode(userLocation.lat, userLocation.lng);
      btn.disabled = false; btn.textContent = '📍 Use my location';
      if (zip) { document.getElementById('zip-input').value = zip; loadRetailers(zip); }
      else setStatus('Could not determine ZIP code. Please enter it manually.');
    },
    err => {
      const msgs = { 1:'Location access denied.', 2:'Location unavailable.', 3:'Request timed out.' };
      setStatus((msgs[err.code] || 'Location error.') + ' Please enter a ZIP code.');
      btn.disabled = false; btn.textContent = '📍 Use my location';
    },
    { timeout: 10000, maximumAge: 60000 }
  );
}

async function useZip() {
  const zip = document.getElementById('zip-input').value.trim();
  if (!/^\d{5}$/.test(zip)) { setStatus('Please enter a valid 5-digit ZIP code.'); return; }
  // Forward-geocode ZIP so we can calculate distances
  const loc = await geocodeZip(zip);
  if (loc) userLocation = loc;
  loadRetailers(zip);
}

async function reverseGeocode(lat, lng) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&email=tech@purelyelizabeth.com`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const d = await r.json();
    return d?.address?.postcode?.slice(0, 5) || null;
  } catch { return null; }
}

async function loadRetailers(postalCode) {
  currentPostalCode = postalCode;
  shopAllUrl = null;
  setStatus('');
  const el = document.getElementById('results');
  el.style.display = 'block';
  el.innerHTML = '<div class="loading">Searching for stores near ' + postalCode + '…</div>';

  try {
    const r = await fetch(`${BASE_URL}/retailers?postal_code=${postalCode}&country_code=US`, { headers: HEADERS });
    const d = await r.json();
    // Filter to only retailers confirmed to carry Purely Elizabeth.
    // If VERIFIED_KEYS is empty (not yet populated), show all retailers as fallback.
    const all = d.retailers || [];
    const filtered = VERIFIED_KEYS.size > 0
      ? all.filter(r => VERIFIED_KEYS.has(r.retailer_key))
      : all;
    renderResults(filtered, postalCode, false);
  } catch {
    el.innerHTML = '<div class="empty-msg">Failed to load. Please try again.</div>';
  }
}

// ── Retailer card HTML ────────────────────────────────────────────────────────
function retailerCardHTML(r, idx) {
  const key      = r.retailer_key || '';
  const distHtml = r._dist != null
    ? `<span class="retailer-dist">${r._dist.toFixed(1)} mi</span>`
    : `<span class="retailer-dist loading" id="dist-${key}">…</span>`;

  return `
    <div class="retailer-card" onclick="openRetailerLink('${key}')">
      <div class="retailer-card-top">
        <img class="retailer-logo" src="${r.retailer_logo_url || ''}" alt="${r.name}" onerror="this.style.display='none'">
        <div class="retailer-info">
          <div class="retailer-name">${r.name}</div>
          <div class="retailer-meta">Carries Purely Elizabeth</div>
        </div>
        ${distHtml}
      </div>
      <button class="retailer-shop-btn" onclick="event.stopPropagation();openRetailerLink('${key}')">
        Shop Purely Elizabeth →
      </button>
    </div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function renderResults(retailers, postalCode, skipEnrich) {
  const el      = document.getElementById('results');
  allRetailers  = retailers;
  const initial = retailers.slice(0, 4);
  const rest    = retailers.slice(4, 20);

  if (!initial.length) {
    el.innerHTML = `<div class="empty-msg">No Instacart stores carrying Purely Elizabeth found near ${postalCode}.</div>` + productSectionHTML();
    return;
  }

  el.innerHTML = `
    <div class="section-hd">
      <h3>Stores near ${postalCode}</h3>
      <span>${retailers.length} store${retailers.length !== 1 ? 's' : ''} carrying Purely Elizabeth</span>
    </div>
    <button class="shop-all-btn" onclick="openShopAll(this)">
      🛒 Shop all Purely Elizabeth on Instacart →
    </button>
    <div class="retailer-grid" id="retailer-grid">
      ${initial.map((r, i) => retailerCardHTML(r, i)).join('')}
    </div>
    ${rest.length ? `
    <button class="expand-btn" id="expand-btn" onclick="expandStores()">
      ↓ Show ${rest.length} more stores nearby
    </button>` : '<div style="margin-bottom:32px"></div>'}

    <hr class="section-divider">
    ${productSectionHTML()}`;

  // Kick off distance enrichment in background (only on first load)
  if (!skipEnrich) enrichWithDistances(retailers);
}

function expandStores() {
  const grid = document.getElementById('retailer-grid');
  const btn  = document.getElementById('expand-btn');
  allRetailers.slice(4, 20).forEach((r, i) => {
    grid.insertAdjacentHTML('beforeend', retailerCardHTML(r, 4 + i));
  });
  if (btn) btn.remove();
}

function openRetailerLink(retailerKey) {
  if (!retailerKey) return;
  window.open(`https://www.instacart.com/store/${retailerKey}/s?k=purely+elizabeth`, '_blank');
}

// ── Shop all (API, uses exact product IDs) ────────────────────────────────────
async function openShopAll(btn) {
  if (shopAllUrl) { window.open(shopAllUrl, '_blank'); return; }
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '⏳ Building cart…';
  try {
    const body = {
      title: 'Purely Elizabeth Products',
      landing_page_configuration: { partner_linkback_url: 'https://purelyelizabeth.com' },
      line_items: PE_PRODUCTS.map(p => ({ product_ids: [p.id], quantity: 1 })),
      expires_in: 365,
    };
    const r = await fetch(`${BASE_URL}/products/products_link`, {
      method: 'POST', headers: HEADERS, body: JSON.stringify(body)
    });
    const d = await r.json();
    if (d.products_link_url) {
      shopAllUrl = d.products_link_url;
      window.open(shopAllUrl, '_blank');
    } else { throw new Error(); }
  } catch {
    btn.textContent = 'Error — try again';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000); return;
  }
  btn.textContent = orig; btn.disabled = false;
}

// ── Product section with category tabs ───────────────────────────────────────
function productSectionHTML() {
  const tabs = CATEGORIES.map(cat =>
    `<button class="cat-tab${cat === activeCat ? ' active' : ''}" onclick="filterProducts('${cat}')">${cat}</button>`
  ).join('');

  const cards = PE_PRODUCTS.map(p => `
    <a class="product-card" href="https://www.instacart.com/products/${p.evergreen}"
       target="_blank" rel="noopener"
       data-cat="${p.tag}"
       ${activeCat !== 'All' && p.tag !== activeCat ? 'hidden' : ''}>
      <img class="product-card-img" src="${p.img}" alt="${p.name}" loading="lazy"
           onerror="this.style.background='#f0ece6'">
      <div class="product-card-body">
        <div class="product-card-tag">${p.tag}</div>
        <div class="product-card-name">${p.name}</div>
        <div class="product-card-size">${p.size}</div>
        <div class="product-card-cta">View on Instacart →</div>
      </div>
    </a>`).join('');

  return `
    <div class="section-hd">
      <h3>Shop Purely Elizabeth</h3>
      <span>Tap any product to view on Instacart</span>
    </div>
    <div class="cat-tabs">${tabs}</div>
    <div class="product-grid" id="product-grid">${cards}</div>`;
}

function filterProducts(cat) {
  activeCat = cat;
  // Update tab active states
  document.querySelectorAll('.cat-tab').forEach(t => {
    t.classList.toggle('active', t.textContent === cat);
  });
  // Show/hide cards
  document.querySelectorAll('#product-grid .product-card').forEach(card => {
    card.hidden = (cat !== 'All' && card.dataset.cat !== cat);
  });
}

document.getElementById('zip-input').addEventListener('keydown', e => { if (e.key === 'Enter') useZip(); });
</script>
</body>
</html>
