<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Purely Elizabeth Near You</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #faf8f4;
    color: #3a2e28;
    min-height: 100vh;
  }

  header {
    background: #fff;
    border-bottom: 1px solid #e8e0d6;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 1.05rem; font-weight: 700; }
  header p  { font-size: 0.78rem; color: #8a7a70; margin-top: 2px; }

  .hero {
    background: linear-gradient(135deg, #f5ede4 0%, #e8f5e9 100%);
    padding: 48px 24px 40px;
    text-align: center;
  }
  .hero h2 { font-size: 1.55rem; font-weight: 800; margin-bottom: 8px; }
  .hero p  { font-size: 0.9rem; color: #6b5e55; max-width: 440px; margin: 0 auto 28px; }

  .locate-btn {
    background: #43A047;
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 13px 28px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background 0.18s;
  }
  .locate-btn:hover    { background: #388E3C; }
  .locate-btn:disabled { background: #aaa; cursor: default; }

  .or-divider { margin: 16px 0; font-size: 0.78rem; color: #aaa; }

  .zip-row { display: flex; justify-content: center; gap: 8px; }
  .zip-row input {
    border: 1.5px solid #d4c8be;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.9rem;
    width: 140px;
    background: #fff;
    color: #3a2e28;
    outline: none;
  }
  .zip-row input:focus { border-color: #43A047; }
  .zip-row button {
    background: #3a2e28;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
  }
  .zip-row button:hover { background: #5a4e48; }

  #status {
    text-align: center;
    font-size: 0.82rem;
    color: #8a7a70;
    margin-top: 14px;
    min-height: 20px;
  }

  .results { max-width: 880px; margin: 32px auto; padding: 0 16px 64px; }

  .section-hd {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-hd h3   { font-size: 1rem; font-weight: 700; }
  .section-hd span { font-size: 0.78rem; color: #8a7a70; }

  /* Shop all button */
  .shop-all-btn {
    display: block;
    width: 100%;
    background: #43A047;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 20px;
    transition: background 0.18s;
  }
  .shop-all-btn:hover    { background: #388E3C; }
  .shop-all-btn:disabled { background: #aaa; cursor: default; }

  /* Retailer grid */
  .retailer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .retailer-card {
    background: #fff;
    border: 1.5px solid #e8e0d6;
    border-radius: 14px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  .retailer-card:hover {
    border-color: #43A047;
    box-shadow: 0 3px 12px rgba(67,160,71,0.14);
  }
  .retailer-card-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .retailer-logo {
    width: 48px;
    height: 48px;
    object-fit: contain;
    border-radius: 10px;
    background: #f5f5f5;
    flex-shrink: 0;
  }
  .retailer-name { font-size: 0.88rem; font-weight: 700; line-height: 1.3; }
  .retailer-meta { font-size: 0.7rem; color: #8a7a70; margin-top: 2px; }
  .retailer-shop-btn {
    display: block;
    width: 100%;
    background: #f0faf0;
    color: #2e7d32;
    border: 1.5px solid #c8e6c9;
    border-radius: 8px;
    padding: 7px;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s;
  }
  .retailer-shop-btn:hover { background: #e0f2e1; }

  .expand-btn {
    display: block;
    width: 100%;
    background: none;
    border: 1.5px solid #e8e0d6;
    border-radius: 10px;
    padding: 11px;
    font-size: 0.82rem;
    font-weight: 600;
    color: #5a4e48;
    cursor: pointer;
    margin-bottom: 32px;
    transition: background 0.15s, border-color 0.15s;
  }
  .expand-btn:hover { background: #f5f0ea; border-color: #c8b8ae; }

  /* Divider */
  .section-divider { border: none; border-top: 1.5px solid #e8e0d6; margin: 0 0 32px; }

  /* Product cards */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 14px;
  }

  .product-card {
    background: #fff;
    border: 1.5px solid #e8e0d6;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .product-card:hover {
    border-color: #43A047;
    box-shadow: 0 3px 10px rgba(67,160,71,0.12);
  }
  .product-card-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: contain;
    background: #f5f5f0;
    display: block;
    padding: 10px;
  }
  .product-card-body {
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .product-card-tag {
    font-size: 0.62rem;
    color: #43A047;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  .product-card-name {
    font-size: 0.79rem;
    font-weight: 700;
    line-height: 1.35;
    flex: 1;
    margin-bottom: 10px;
  }
  .product-card-btn {
    display: block;
    width: 100%;
    background: #43A047;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 4px;
    font-size: 0.74rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .product-card-btn:hover    { background: #388E3C; }
  .product-card-btn:disabled { background: #aaa; cursor: default; }

  .loading   { text-align: center; padding: 40px; color: #8a7a70; }
  .empty-msg { text-align: center; color: #8a7a70; padding: 40px 0; font-size: 0.88rem; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Purely Elizabeth</h1>
    <p>Find products available for delivery near you</p>
  </div>
</header>

<div class="hero">
  <h2>Get it delivered today</h2>
  <p>See which stores near you carry Purely Elizabeth on Instacart — delivered in as fast as 2 hours.</p>

  <button class="locate-btn" id="locate-btn" onclick="useLocation()">
    📍 Use my location
  </button>

  <div class="or-divider">— or enter your ZIP code —</div>

  <div class="zip-row">
    <input type="text" id="zip-input" placeholder="e.g. 10001" maxlength="5">
    <button onclick="useZip()">Search</button>
  </div>

  <div id="status"></div>
</div>

<div class="results" id="results" style="display:none"></div>

<script>
const API_KEY  = 'keys.VEcDoDj0RNmIni5MffpBh7LoWC24Jk8tXTha5qSgICk';
const BASE_URL = 'https://connect.instacart.com/idp/v1';
// Dev fallback:
// const API_KEY  = 'keys._XddmzVXMxYscOfhvVZs-QKJJ4h1LUC6F2I2Y6qrpH0';
// const BASE_URL = 'https://connect.dev.instacart.tools/idp/v1';
const HEADERS  = { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' };

const CDN = 'https://cdn.shopify.com/s/files/1/0264/3725/5250/files/';

const PE_PRODUCTS = [
  {
    name: 'Peanut Butter Cookie Granola',
    tag: 'Cookie Granola',
    img: CDN + 'PBCookieV2_Hero.webp?v=1749060545',
    query: 'Peanut Butter Cookie Granola',
  },
  {
    name: 'Dark Chocolate Blueberry Protein Granola',
    tag: 'Protein Granola',
    img: CDN + 'ProteinG_DarkChocolateBlueberry_V1_Hero.webp?v=1774023806',
    query: 'Dark Chocolate Blueberry Protein Granola',
  },
  {
    name: 'Chocolate Peanut Butter Ancient Grain Granola',
    tag: 'Ancient Grain Granola',
    img: CDN + 'ChocolatPeanutButterV2_Hero.webp?v=1748031191',
    query: 'Chocolate Peanut Butter Granola',
  },
  {
    name: 'Maple Almond Butter Ancient Grain Granola',
    tag: 'Ancient Grain Granola',
    img: CDN + 'MapleAlmondButterV2_Hero.webp?v=1740067163',
    query: 'Maple Almond Butter Granola',
  },
  {
    name: 'Maple Cinnamon Roll Protein Oatmeal Cup',
    tag: 'Protein Oatmeal',
    img: CDN + 'ProteinOatmealCupV1.1_ProteinOat_MCR_Hero.webp?v=1774371696',
    query: 'Maple Cinnamon Roll Protein Oatmeal',
  },
  {
    name: 'Apple Harvest Crumble Protein Oatmeal Cup',
    tag: 'Protein Oatmeal',
    img: CDN + 'ProteinOatmealCupV1.1_ProteinOat_ACH_Hero.webp?v=1774371927',
    query: 'Apple Harvest Crumble Protein Oatmeal',
  },
  {
    name: 'Original Superfood Oatmeal Pouch',
    tag: 'Superfood Oatmeal',
    img: CDN + '220z_Oatmeal_Original_Pouch_V1.1_Hero.webp?v=1782494066',
    query: 'Original Superfood Oatmeal',
  },
  {
    name: 'Cinnamon Raisin Almond Superfood Cereal',
    tag: 'Superfood Cereal',
    img: CDN + 'CinnamonRaisinAlmondV3.1_Hero_0faf22eb-160f-40d1-a027-e241bb011170.webp?v=1777048187',
    query: 'Cinnamon Raisin Almond Cereal',
  },
];

let currentPostalCode = null;
const productLinkCache = new Map();

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function useLocation() {
  const btn = document.getElementById('locate-btn');
  btn.disabled = true;
  btn.textContent = 'Locating…';
  setStatus('Requesting location access…');

  if (!navigator.geolocation) {
    setStatus('Geolocation not supported. Please enter a ZIP code.');
    btn.disabled = false; btn.textContent = '📍 Use my location';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async pos => {
      setStatus('Got your location — finding ZIP code…');
      const zip = await reverseGeocode(pos.coords.latitude, pos.coords.longitude);
      btn.disabled = false; btn.textContent = '📍 Use my location';
      if (zip) {
        document.getElementById('zip-input').value = zip;
        loadRetailers(zip);
      } else {
        setStatus('Could not determine ZIP code. Please enter it manually.');
      }
    },
    err => {
      const msgs = { 1: 'Location access denied.', 2: 'Location unavailable.', 3: 'Request timed out.' };
      setStatus((msgs[err.code] || 'Location error.') + ' Please enter a ZIP code.');
      btn.disabled = false; btn.textContent = '📍 Use my location';
    },
    { timeout: 10000, maximumAge: 60000 }
  );
}

function useZip() {
  const zip = document.getElementById('zip-input').value.trim();
  if (!/^\d{5}$/.test(zip)) { setStatus('Please enter a valid 5-digit ZIP code.'); return; }
  loadRetailers(zip);
}

async function reverseGeocode(lat, lng) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&email=tech@purelyelizabeth.com`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const d = await r.json();
    return d?.address?.postcode?.slice(0, 5) || null;
  } catch { return null; }
}

async function loadRetailers(postalCode) {
  currentPostalCode = postalCode;
  setStatus('');
  const el = document.getElementById('results');
  el.style.display = 'block';
  el.innerHTML = '<div class="loading">Searching for stores near ' + postalCode + '…</div>';

  try {
    const r = await fetch(`${BASE_URL}/retailers?postal_code=${postalCode}&country_code=US`, { headers: HEADERS });
    const d = await r.json();
    renderResults(d.retailers || [], postalCode);
  } catch {
    el.innerHTML = '<div class="empty-msg">Failed to load. Please try again.</div>';
  }
}

let allRetailers = [];

function retailerCardHTML(r) {
  const key = r.retailer_key || '';
  return `
    <div class="retailer-card" onclick="openRetailerLink('${key}')">
      <div class="retailer-card-top">
        <img class="retailer-logo" src="${r.retailer_logo_url || ''}" alt="${r.name}" onerror="this.style.display='none'">
        <div>
          <div class="retailer-name">${r.name}</div>
          <div class="retailer-meta">Available on Instacart</div>
        </div>
      </div>
      <button class="retailer-shop-btn" onclick="event.stopPropagation();openRetailerLink('${key}')">
        Shop Purely Elizabeth →
      </button>
    </div>`;
}

function renderResults(retailers, postalCode) {
  const el = document.getElementById('results');
  allRetailers = retailers;

  if (!retailers.length) {
    el.innerHTML = `<div class="empty-msg">No Instacart retailers found near ${postalCode}.</div>` + productSectionHTML();
    return;
  }

  const initial = retailers.slice(0, 4);
  const remaining = retailers.slice(4, 20);

  el.innerHTML = `
    <div class="section-hd">
      <h3>Stores near ${postalCode}</h3>
      <span>${retailers.length} retailers on Instacart</span>
    </div>
    <button class="shop-all-btn" onclick="openShopAll(this)">
      🛒 Shop all Purely Elizabeth on Instacart →
    </button>
    <div class="retailer-grid" id="retailer-grid">
      ${initial.map(retailerCardHTML).join('')}
    </div>
    ${remaining.length ? `
    <button class="expand-btn" id="expand-btn" onclick="expandStores()">
      ↓ Show ${remaining.length} more stores nearby
    </button>` : '<div style="margin-bottom:32px"></div>'}

    <hr class="section-divider">
    ${productSectionHTML()}`;
}

function productSectionHTML() {
  return `
    <div class="section-hd">
      <h3>Shop Purely Elizabeth</h3>
      <span>Tap any product to add to your Instacart cart</span>
    </div>
    <div class="product-grid">
      ${PE_PRODUCTS.map((p, i) => `
        <div class="product-card">
          <img class="product-card-img" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.background='#f0ece6';this.style.minHeight='100px'">
          <div class="product-card-body">
            <div class="product-card-tag">${p.tag}</div>
            <div class="product-card-name">${p.name}</div>
            <button class="product-card-btn" onclick="openProductLink(${i}, this)">
              Add to Instacart →
            </button>
          </div>
        </div>`).join('')}
    </div>`;
}

function expandStores() {
  const grid = document.getElementById('retailer-grid');
  const btn  = document.getElementById('expand-btn');
  const extra = allRetailers.slice(4, 20);
  extra.forEach(r => grid.insertAdjacentHTML('beforeend', retailerCardHTML(r)));
  if (btn) btn.remove();
}

function openRetailerLink(retailerKey) {
  if (!retailerKey) return;
  window.open(`https://www.instacart.com/store/${retailerKey}/s?k=purely+elizabeth`, '_blank');
}

async function openShopAll(btn) {
  const cacheKey = '__all__';
  if (productLinkCache.has(cacheKey)) { window.open(productLinkCache.get(cacheKey), '_blank'); return; }

  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = '⏳ Generating cart…';

  try {
    const body = {
      title: 'Purely Elizabeth Products',
      landing_page_configuration: { partner_linkback_url: 'https://purelyelizabeth.com' },
      line_items: PE_PRODUCTS.map(p => ({ name: p.query, quantity: 1, filters: { brand_filters: ['Purely Elizabeth'] } })),
      expires_in: 365,
    };
    const r = await fetch(`${BASE_URL}/products/products_link`, {
      method: 'POST', headers: HEADERS, body: JSON.stringify(body)
    });
    const d = await r.json();
    if (d.products_link_url) {
      productLinkCache.set(cacheKey, d.products_link_url);
      window.open(d.products_link_url, '_blank');
    } else {
      btn.textContent = 'Try again';
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
      return;
    }
  } catch {
    btn.textContent = 'Error — try again';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
    return;
  }

  btn.textContent = orig;
  btn.disabled = false;
}

async function openProductLink(idx, btn) {
  const product = PE_PRODUCTS[idx];
  const cacheKey = product.query;

  if (productLinkCache.has(cacheKey)) { window.open(productLinkCache.get(cacheKey), '_blank'); return; }

  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Loading…';

  try {
    const body = {
      title: product.name,
      landing_page_configuration: { partner_linkback_url: 'https://purelyelizabeth.com' },
      line_items: [{ name: product.query, quantity: 1, filters: { brand_filters: ['Purely Elizabeth'] } }],
      expires_in: 365,
    };
    const r = await fetch(`${BASE_URL}/products/products_link`, {
      method: 'POST', headers: HEADERS, body: JSON.stringify(body)
    });
    const d = await r.json();
    if (d.products_link_url) {
      productLinkCache.set(cacheKey, d.products_link_url);
      window.open(d.products_link_url, '_blank');
    } else {
      btn.textContent = 'Try again';
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
      return;
    }
  } catch {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
    return;
  }

  btn.textContent = orig;
  btn.disabled = false;
}

document.getElementById('zip-input').addEventListener('keydown', e => { if (e.key === 'Enter') useZip(); });
</script>
</body>
</html>
