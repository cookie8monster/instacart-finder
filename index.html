<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Purely Elizabeth Near You</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #faf8f4;
    color: #3a2e28;
    min-height: 100vh;
  }

  header {
    background: #fff;
    border-bottom: 1px solid #e8e0d6;
    padding: 18px 24px;
  }
  header h1 { font-size: 1.05rem; font-weight: 700; }
  header p  { font-size: 0.78rem; color: #8a7a70; margin-top: 2px; }

  .hero {
    background: linear-gradient(135deg, #f5ede4 0%, #e8f5e9 100%);
    padding: 48px 24px 40px;
    text-align: center;
  }
  .hero h2 { font-size: 1.55rem; font-weight: 800; margin-bottom: 8px; }
  .hero p  { font-size: 0.9rem; color: #6b5e55; max-width: 440px; margin: 0 auto 28px; }

  .locate-btn {
    background: #43A047;
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 13px 28px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background 0.18s;
  }
  .locate-btn:hover   { background: #388E3C; }
  .locate-btn:disabled { background: #aaa; cursor: default; }

  .or-divider { margin: 16px 0; font-size: 0.78rem; color: #aaa; }

  .zip-row { display: flex; justify-content: center; gap: 8px; }
  .zip-row input {
    border: 1.5px solid #d4c8be;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.9rem;
    width: 140px;
    background: #fff;
    color: #3a2e28;
    outline: none;
  }
  .zip-row input:focus { border-color: #43A047; }
  .zip-row button {
    background: #3a2e28;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
  }
  .zip-row button:hover { background: #5a4e48; }

  #status {
    text-align: center;
    font-size: 0.82rem;
    color: #8a7a70;
    margin-top: 14px;
    min-height: 20px;
  }

  .results { max-width: 800px; margin: 32px auto; padding: 0 16px 48px; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .results-header h3   { font-size: 1rem; font-weight: 700; }
  .results-header span { font-size: 0.78rem; color: #8a7a70; }

  .shop-all-btn {
    display: block;
    width: 100%;
    background: #43A047;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 24px;
    transition: background 0.18s;
  }
  .shop-all-btn:hover { background: #388E3C; }

  .retailer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .retailer-card {
    background: #fff;
    border: 1.5px solid #e8e0d6;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .retailer-card:hover {
    border-color: #43A047;
    box-shadow: 0 2px 8px rgba(67,160,71,0.15);
  }
  .retailer-logo {
    width: 44px;
    height: 44px;
    object-fit: contain;
    border-radius: 8px;
    background: #f5f5f5;
    flex-shrink: 0;
  }
  .retailer-name { font-size: 0.82rem; font-weight: 600; line-height: 1.3; }
  .retailer-tag  { font-size: 0.68rem; color: #43A047; margin-top: 3px; }

  .loading { text-align: center; padding: 40px; color: #8a7a70; }
  .empty-msg { text-align: center; color: #8a7a70; padding: 40px 0; font-size: 0.88rem; }
</style>
</head>
<body>

<header>
  <h1>Purely Elizabeth</h1>
  <p>Find products available for delivery near you</p>
</header>

<div class="hero">
  <h2>Get it delivered today</h2>
  <p>See which stores near you carry Purely Elizabeth on Instacart — delivered in as fast as 2 hours.</p>

  <button class="locate-btn" id="locate-btn" onclick="useLocation()">
    📍 Use my location
  </button>

  <div class="or-divider">— or enter your ZIP code —</div>

  <div class="zip-row">
    <input type="text" id="zip-input" placeholder="e.g. 10001" maxlength="5">
    <button onclick="useZip()">Search</button>
  </div>

  <div id="status"></div>
</div>

<div class="results" id="results" style="display:none"></div>

<script>
// Production key (approved)
const API_KEY  = 'keys.VEcDoDj0RNmIni5MffpBh7LoWC24Jk8tXTha5qSgICk';
const BASE_URL = 'https://connect.instacart.com/idp/v1';
// Dev fallback:
// const API_KEY  = 'keys._XddmzVXMxYscOfhvVZs-QKJJ4h1LUC6F2I2Y6qrpH0';
// const BASE_URL = 'https://connect.dev.instacart.tools/idp/v1';
const HEADERS  = { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' };

const PE_LINE_ITEMS = [
  { name: 'Purely Elizabeth Ancient Grain Granola',
    upcs: ['855140002168','855140002175','855140002151','855140002144',
           '855140002984','855140002991','855140002656','855140002663',
           '855140002687'], quantity: 1 },
  { name: 'Purely Elizabeth Grain Free Granola',
    upcs: ['810589030295','810589030301','855140002700','855140002724'], quantity: 1 },
  { name: 'Purely Elizabeth Cookie Granola',
    upcs: ['810589031971','810589031964','810589031988','810589032039',
           '810589032015','810589032220','810589032244','810589032183',
           '810589032541'], quantity: 1 },
  { name: 'Purely Elizabeth Protein Granola',
    upcs: ['810589032596','810589032602','810589032619'], quantity: 1 },
  { name: 'Purely Elizabeth Protein Oatmeal',
    upcs: ['810589032411','810589032435','810589032459',
           '810589032794','810589032800'], quantity: 1 },
  { name: 'Purely Elizabeth Superfood Oatmeal',
    upcs: ['081058903034','081058903167','081058903174','810589031735',
           '810589031742','810589031070','810589031087','810589030332',
           '810589031629','810589031636'], quantity: 1 },
  { name: 'Purely Elizabeth Superfood Cereal',
    upcs: ['810589030035','810589031698','810589031940',
           '810589031957','810589032688'], quantity: 1 },
];

let currentPostalCode = null;

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function useLocation() {
  const btn = document.getElementById('locate-btn');
  btn.disabled = true;
  btn.textContent = 'Locating…';
  setStatus('Requesting location access…');

  if (!navigator.geolocation) {
    setStatus('Geolocation not supported. Please enter a ZIP code.');
    btn.disabled = false; btn.textContent = '📍 Use my location';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async pos => {
      setStatus('Got your location — finding ZIP code…');
      const zip = await reverseGeocode(pos.coords.latitude, pos.coords.longitude);
      btn.disabled = false; btn.textContent = '📍 Use my location';
      if (zip) {
        document.getElementById('zip-input').value = zip;
        loadRetailers(zip);
      } else {
        setStatus('Could not determine ZIP code. Please enter it manually.');
      }
    },
    err => {
      const msgs = { 1:'Location access denied.', 2:'Location unavailable.', 3:'Request timed out.' };
      setStatus((msgs[err.code] || 'Location error.') + ' Please enter a ZIP code.');
      btn.disabled = false; btn.textContent = '📍 Use my location';
    },
    { timeout: 10000, maximumAge: 60000 }
  );
}

function useZip() {
  const zip = document.getElementById('zip-input').value.trim();
  if (!/^\d{5}$/.test(zip)) { setStatus('Please enter a valid 5-digit ZIP code.'); return; }
  loadRetailers(zip);
}

async function reverseGeocode(lat, lng) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&email=tech@purelyelizabeth.com`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const d = await r.json();
    return d?.address?.postcode?.slice(0, 5) || null;
  } catch { return null; }
}

async function loadRetailers(postalCode) {
  currentPostalCode = postalCode;
  setStatus('');
  const el = document.getElementById('results');
  el.style.display = 'block';
  el.innerHTML = '<div class="loading">Searching for stores near ' + postalCode + '…</div>';

  try {
    const r = await fetch(`${BASE_URL}/retailers?postal_code=${postalCode}&country_code=US`, { headers: HEADERS });
    const d = await r.json();
    renderResults(d.retailers || [], postalCode);
  } catch {
    el.innerHTML = '<div class="empty-msg">Failed to load. Please try again.</div>';
  }
}

function renderResults(retailers, postalCode) {
  const el = document.getElementById('results');
  if (!retailers.length) {
    el.innerHTML = `<div class="empty-msg">No Instacart retailers found near ${postalCode}.</div>`;
    return;
  }

  el.innerHTML = `
    <div class="results-header">
      <h3>Stores near ${postalCode}</h3>
      <span>${retailers.length} retailers on Instacart</span>
    </div>
    <button class="shop-all-btn" onclick="openShopLink(null)">
      🛒 Shop all Purely Elizabeth products on Instacart →
    </button>
    <div class="retailer-grid">${retailers.map(r => `
      <div class="retailer-card" onclick="window.open('https://www.instacart.com/store/${r.retailer_key}/search?query=purely+elizabeth','_blank')">
        <img class="retailer-logo" src="${r.retailer_logo_url}" alt="${r.name}" onerror="this.style.display='none'">
        <div>
          <div class="retailer-name">${r.name}</div>
          <div class="retailer-tag">Shop PE products →</div>
        </div>
      </div>`).join('')}
    </div>`;
}

async function openShopLink(retailerKey) {
  setStatus('Generating your Instacart cart…');
  try {
    const body = {
      title: 'Purely Elizabeth Products',
      line_items: PE_LINE_ITEMS,
      expires_in: 30,
    };

    const r = await fetch(`${BASE_URL}/products/products_link`, {
      method: 'POST', headers: HEADERS, body: JSON.stringify(body)
    });
    const d = await r.json();
    if (d.products_link_url) { setStatus(''); window.open(d.products_link_url, '_blank'); }
    else { setStatus('Could not generate link. Please try again.'); }
  } catch { setStatus('Error. Please try again.'); }
}

document.getElementById('zip-input').addEventListener('keydown', e => { if (e.key === 'Enter') useZip(); });
</script>
</body>
</html>
